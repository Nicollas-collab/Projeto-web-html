<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJETO WEB - HTML/CSS</title>

    <link rel="stylesheet" href="../../css/style_formulario.css">
</head>

<body>

    <div id="links">
        <a href="../index.html">Página inicial</a> | <a href="texto.html">Texto</a> | <a
            href="/outras paginas/outro-texto.html">Outro texto</a> | <a href="cadastro.html">Cadastro</a> | <a
            href="listas.html">Listas</a> | <a href="tabela.html">Tabela</a> | <a href="imagens.html">Imagens</a>
    </div>

    <div id="div-form">
        <h3>Formulário HTML </h3>

        <form name="form-pessoa" id="form-pessoa" method="post">
            <!-- MAXLENGTH: para o máximo de caracteres
            NAME: Algumas linguagens não lêem o id, só o name
            REQUIRED: pra ser um campo obrigatório
            PLACEHOLDER: nome de fundo do campo
            CLASS: para dar um nome ou identificador a um ou mais elementos HTML
            checked: selecionar automaticamente uma opção

            colocar o "name" diferente no tipo radio, pode escolher mais de uma opção-->

            <label for="nome">Nome</label>
            <input type="text" name="nome" id="nome" class="input-txt01" maxlength="30" required
                placeholder="Informe seu nome!">

            <label for="cpf">CPF</label>
            <input type="number" name="cpf" id="cpf" class="input-txt02" maxlength="14" required
                placeholder="informe o cpf">

            <label for="cpf">CPF</label>
            <input type="text" name="cpf" id="cpf" class="input-txt02" maxlength="14" required
                pattern="\[0-9]{3}\.\[0-9]{3}\.[0-9]{3}-[0-9]{2}" placeholder="000.000.000-00">

            <label for="sexo">Seu sexo:</label>
            <input type="radio" name="sexo" id="sxF" class="input-radio" required value="F"> Feminino
            <input type="radio" name="sexo" id="sxM" class="input-radio" required value="F"> Masculino
            <input type="radio" name="sexo" id="sxND" class="input-radio" required value="F"> Não declarar

            <label for="estado">Estado</label>
            <select name="estado" id="estado" required>
                <option>Selecione o Estado:</option>
                <option value="Al">Alagoas</option>
                <option value="Ba">Bahia</option>
                <option value="Pe">Pernambuco</option>
                <option value="Pb">Paraiba</option>
                <option value="RN">Rio Grande do Norte</option>
                <option value="Ce">Ceará</option>
                <option value="Pi">Piaui</option>
                <option value="Ma">Maranhão</option>
                <option value="Se">Sergipe</option>
            </select>

            <label for="escolhas">Preferências:</label>
            <input type="checkbox" name="estudo" class="input-check" id="estudo" value="estudo">Estudo
            <input type="checkbox" name="viagem" class="input-check" id="viagem" value="viagem">Viagem
            <input type="checkbox" name="trabalho" class="input-check" id="trabalho" value="trabalho">Trabalho
            <input type="checkbox" name="compras" class="input-check" id="compras" value="compras">Compras

            <label for="comentarios"> Comentários </label>
            <textarea name="comentarios" id="comentario"></textarea>

            <label for="senha">Senha</label>
            <input type="password" name="senha" id="senha" class="input-txt02" required placeholder="Informe uma senha"
                maxlength="10">

            <label for="datanascimento">Data Nascimento</label>
            <input type="date" name="datanascimento" id="datanascimento" class="input-txt02" required>

            <label for="quantidade">Quantidade</label>
            <input type="range" name="quantidade" id="quantidade" class="input-txt02" min="0" max="10" value="2">

            <div id="div-btns">
                <button type="submit" id="btn-enviar" class="btn">Enviar</button>
                <button type="reset" id="btn-limpar" class="btn">Limpar</button>
                <button id="btn" class="btn">Botão</button>
            </div>

        </form>


    </div>

</body>

</html>
